<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Bengkel Digital</title>
    <!-- Library Eksternal -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 text-slate-900">

    <nav class="bg-blue-600 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-xl flex items-center gap-2">
                <i data-lucide="wrench"></i> Bengkel Kita
            </h1>
            <div id="online-status" class="text-xs bg-blue-500 px-3 py-1 rounded-full">Sistem Aktif</div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto p-4 md:p-8">
        <!-- FORM INPUT -->
        <section class="mb-10 bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h2 class="text-lg font-bold mb-5 flex items-center gap-2 text-blue-700">
                <i data-lucide="plus-circle"></i> Catat Servis Baru
            </h2>
            <form id="service-form" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <input type="text" id="nama" class="input-field" placeholder="Nama Pelanggan" required>
                <input type="text" id="motor" class="input-field" placeholder="Jenis Motor" required>
                <input type="text" id="keluhan" class="input-field" placeholder="Keluhan" required>
                <input type="text" id="tindakan" class="input-field" placeholder="Tindakan" required>
                <input type="number" id="biaya" class="input-field" placeholder="Total Biaya (Rp)" required>
                <button type="submit" id="btn-simpan" class="btn-primary">
                    <i data-lucide="save" class="w-5 h-5"></i> Simpan Data
                </button>
            </form>
        </section>

        <!-- DAFTAR DATA -->
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-extrabold">Riwayat Servis</h2>
            <button id="refresh-btn" class="text-slate-400 hover:text-blue-600 transition">
                <i data-lucide="refresh-cw" class="w-5 h-5"></i>
            </button>
        </div>

        <div id="loader" class="flex flex-col items-center py-20">
            <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-blue-600"></div>
        </div>

        <div id="app-container" class="grid gap-4 grid-cols-1 md:grid-cols-2"></div>
    </main>

    <!-- Hubungkan ke file JS -->
    <script src="script.js"></script>
</body>
</html>
